<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoVision AI - Professional Crypto Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
            color: #fff;
        }

        .crypto-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }

        .card-glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
            }
            50% {
                box-shadow: 0 0 30px rgba(59, 130, 246, 0.2);
            }
        }

        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        input::placeholder {
            color: #6b7280;
        }

        /* Responsive tweaks */
        @media (max-width: 640px) {
            .hidden.sm\:block {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Lucide React Icons
        const { Search, Home, Bookmark, TrendingUp, Menu, X, Download, Share2, Link2 } = lucide;

        const CryptoVisionApp = () => {
          const [currentPage, setCurrentPage] = React.useState('home');
          const [selectedCoin, setSelectedCoin] = React.useState(null);
          const [coins, setCoins] = React.useState([]);
          const [loading, setLoading] = React.useState(false);
          const [searchQuery, setSearchQuery] = React.useState('');
          const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);

          // Fetch coins data
          React.useEffect(() => {
            const fetchCoins = async () => {
              try {
                setLoading(true);
                const res = await fetch(
                  'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&sparkline=false'
                );
                const data = await res.json();
                setCoins(data);
              } catch (error) {
                console.error('Error fetching coins:', error);
              } finally {
                setLoading(false);
              }
            };
            fetchCoins();
          }, []);

          const filteredCoins = coins.filter(coin =>
            coin.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
            coin.symbol.toLowerCase().includes(searchQuery.toLowerCase())
          );

          const topGainers = coins.slice(0, 250)
            .sort((a, b) => (b.price_change_percentage_24h || 0) - (a.price_change_percentage_24h || 0))
            .slice(0, 5);

          const topLosers = coins.slice(0, 250)
            .sort((a, b) => (a.price_change_percentage_24h || 0) - (b.price_change_percentage_24h || 0))
            .slice(0, 5);

          const totalMarketCap = coins.reduce((sum, coin) => sum + (coin.market_cap || 0), 0);
          const btcDominance = coins[0]?.market_cap_percentage || 0;

          return (
            <div className="min-h-screen bg-gradient-to-b from-slate-900 via-blue-900 to-slate-900">
              {/* Header */}
              <header className="sticky top-0 z-50 bg-slate-900/80 backdrop-blur border-b border-blue-500/20">
                <div className="flex items-center justify-between p-4 max-w-7xl mx-auto w-full">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                      <span className="text-white font-bold text-lg">CV</span>
                    </div>
                    <h1 className="text-white font-bold text-xl hidden sm:block">CryptoVision AI</h1>
                  </div>

                  {/* Desktop Navigation */}
                  <nav className="hidden md:flex gap-6">
                    <button onClick={() => setCurrentPage('home')} className={`flex items-center gap-2 px-4 py-2 rounded-lg transition ${currentPage === 'home' ? 'bg-blue-500/20 text-blue-400' : 'text-gray-400 hover:text-white'}`}>
                      <Home size={20} /> Dashboard
                    </button>
                  </nav>

                  {/* Mobile Menu Button */}
                  <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="md:hidden text-white">
                    {mobileMenuOpen ? <X size={24} /> : <Menu size={24} />}
                  </button>
                </div>

                {/* Mobile Navigation */}
                {mobileMenuOpen && (
                  <div className="md:hidden border-t border-blue-500/20 p-4 space-y-2">
                    <button onClick={() => { setCurrentPage('home'); setMobileMenuOpen(false); }} className="w-full flex items-center gap-2 px-4 py-2 rounded-lg bg-blue-500/20 text-blue-400">
                      <Home size={20} /> Dashboard
                    </button>
                  </div>
                )}
              </header>

              {/* Main Content */}
              <main className="flex-1 p-4 max-w-7xl mx-auto w-full">
                {currentPage === 'home' && (
                  <>
                    {/* Search Bar */}
                    <div className="mb-8">
                      <div className="relative">
                        <Search className="absolute left-4 top-3.5 text-gray-400" size={20} />
                        <input
                          type="text"
                          placeholder="Cari coin (BTC, ETH, SOL, PEPE...)"
                          value={searchQuery}
                          onChange={(e) => setSearchQuery(e.target.value)}
                          className="w-full bg-slate-800 border border-blue-500/30 rounded-lg pl-12 pr-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500"
                        />
                      </div>
                    </div>

                    {/* Hero Section */}
                    {!searchQuery && (
                      <div className="mb-12 text-center">
                        <h2 className="text-3xl md:text-4xl font-bold text-white mb-2">
                          Analisis Crypto <span className="text-blue-400">AI Professional</span>
                        </h2>
                        <p className="text-gray-400 mb-8 max-w-2xl mx-auto">
                          Smart Money Concept, Fibonacci otomatis, support/resistance, AI confidence score, entry recommendation, stop loss, take profit — semua dalam satu dashboard.
                        </p>

                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                          <button onClick={() => setSelectedCoin(coins.find(c => c.id === 'ethereum'))} className="bg-gradient-to-r from-blue-500/20 to-purple-500/20 border border-blue-500/30 rounded-lg py-3 text-white hover:border-blue-500 transition">
                            Lihat ETH
                          </button>
                          <button onClick={() => setSelectedCoin(coins.find(c => c.id === 'solana'))} className="bg-gradient-to-r from-blue-500/20 to-purple-500/20 border border-blue-500/30 rounded-lg py-3 text-white hover:border-blue-500 transition">
                            Lihat SOL
                          </button>
                          <button onClick={() => setSelectedCoin(coins.find(c => c.id === 'bitcoin'))} className="bg-gradient-to-r from-blue-500/20 to-purple-500/20 border border-blue-500/30 rounded-lg py-3 text-white hover:border-blue-500 transition">
                            Lihat BTC
                          </button>
                        </div>

                        {/* Market Stats */}
                        <div className="grid grid-cols-2 gap-4 md:grid-cols-4">
                          <div className="bg-slate-800/50 border border-blue-500/20 rounded-lg p-4">
                            <div className="flex items-center gap-2 mb-2">
                              <span className="text-gray-400 text-sm">Total Market Cap</span>
                            </div>
                            <p className="text-white font-bold">${(totalMarketCap / 1e12).toFixed(2)}T</p>
                          </div>
                          <div className="bg-slate-800/50 border border-blue-500/20 rounded-lg p-4">
                            <div className="flex items-center gap-2 mb-2">
                              <span className="text-gray-400 text-sm">BTC Dominance</span>
                            </div>
                            <p className="text-white font-bold">{btcDominance?.toFixed(1)}%</p>
                          </div>
                          <div className="bg-slate-800/50 border border-blue-500/20 rounded-lg p-4">
                            <div className="flex items-center gap-2 mb-2">
                              <span className="text-gray-400 text-sm">Fear & Greed</span>
                            </div>
                            <p className="text-red-400 font-bold">14 · Extreme Fear</p>
                          </div>
                          <div className="bg-slate-800/50 border border-blue-500/20 rounded-lg p-4">
                            <div className="flex items-center gap-2 mb-2">
                              <span className="text-gray-400 text-sm">Coins Tracked</span>
                            </div>
                            <p className="text-white font-bold">2000+</p>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* Features Section */}
                    {!searchQuery && (
                      <div className="mb-12">
                        <h3 className="text-xl font-bold text-white mb-6">Semua yang Anda butuhkan untuk analisis profesional</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <FeatureCard icon="🧠" title="AI Technical Analysis" desc="Kombinasi 20+ indikator: EMA, RSI, MACD, Ichimoku, SuperTrend, ADX, dan banyak lagi." />
                          <FeatureCard icon="🎯" title="Smart Entry System" desc="Entry zone, stop loss, dan 3 take profit otomatis dengan risk/reward ratio." />
                          <FeatureCard icon="📊" title="TradingView Charts" desc="Chart interaktif kelas dunia dengan candlestick, volume, dan indikator built-in." />
                          <FeatureCard icon="💰" title="Smart Money Concept" desc="BOS, CHOCH, Order Block, FVG, dan Liquidity Zone terdeteksi otomatis." />
                          <FeatureCard icon="📈" title="Fibonacci Otomatis" desc="Retracement & extension 0.236 → 2.618 dari swing aktif." />
                          <FeatureCard icon="📰" title="News Impact AI" desc="Klasifikasi sentiment headline crypto untuk coin yang Anda pantau." />
                        </div>
                      </div>
                    )}

                    {/* Coins List */}
                    {searchQuery && (
                      <div className="space-y-3">
                        <h3 className="text-white font-bold mb-4">Hasil Pencarian</h3>
                        {filteredCoins.slice(0, 20).map(coin => (
                          <CoinListItem 
                            key={coin.id} 
                            coin={coin} 
                            onClick={() => setSelectedCoin(coin)}
                          />
                        ))}
                      </div>
                    )}

                    {/* Top Gainers & Losers */}
                    {!searchQuery && (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                          <h3 className="text-white font-bold mb-4 flex items-center gap-2">
                            <span>📈</span> Top Gainers 24H
                          </h3>
                          <div className="space-y-3">
                            {topGainers.map(coin => (
                              <CoinListItem 
                                key={coin.id} 
                                coin={coin} 
                                onClick={() => setSelectedCoin(coin)}
                                highlight="green"
                              />
                            ))}
                          </div>
                        </div>
                        <div>
                          <h3 className="text-white font-bold mb-4 flex items-center gap-2">
                            <span>📉</span> Top Losers 24H
                          </h3>
                          <div className="space-y-3">
                            {topLosers.map(coin => (
                              <CoinListItem 
                                key={coin.id} 
                                coin={coin} 
                                onClick={() => setSelectedCoin(coin)}
                                highlight="red"
                              />
                            ))}
                          </div>
                        </div>
                      </div>
                    )}
                  </>
                )}
              </main>

              {/* Coin Detail Modal */}
              {selectedCoin && (
                <CoinDetailView 
                  coin={selectedCoin} 
                  onClose={() => setSelectedCoin(null)}
                />
              )}

              {/* Footer */}
              <footer className="border-t border-blue-500/20 bg-slate-900 mt-12">
                <div className="max-w-7xl mx-auto p-6 text-center text-gray-400 text-sm">
                  <p className="mb-2">CryptoVision — AI-powered crypto analysis & auto-trading.</p>
                  <p className="mb-4">Data: Binance · Bybit · OKX · Gate.io · CoinGecko · Alternative.me</p>
                  <p className="text-yellow-600">⚠ Bukan saran finansial. Trading futures berisiko tinggi</p>
                </div>
              </footer>
            </div>
          );
        };

        // Feature Card Component
        const FeatureCard = ({ icon, title, desc }) => (
          <div className="bg-slate-800/50 border border-blue-500/20 rounded-lg p-4 hover:border-blue-500/50 transition">
            <div className="text-2xl mb-2">{icon}</div>
            <h4 className="text-white font-bold mb-2">{title}</h4>
            <p className="text-gray-400 text-sm">{desc}</p>
          </div>
        );

        // Coin List Item Component
        const CoinListItem = ({ coin, onClick, highlight }) => {
          const change = coin.price_change_percentage_24h || 0;
          const isPositive = change > 0;

          return (
            <button
              onClick={onClick}
              className={`w-full bg-slate-800/50 border rounded-lg p-4 text-left hover:bg-slate-800 transition ${
                highlight === 'green' ? 'border-green-500/30' : highlight === 'red' ? 'border-red-500/30' : 'border-blue-500/20'
              }`}
            >
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3 flex-1 min-w-0">
                  {coin.image && (
                    <img src={coin.image} alt={coin.name} className="w-10 h-10 rounded-full" />
                  )}
                  <div className="min-w-0">
                    <p className="text-white font-bold">{coin.symbol.toUpperCase()}</p>
                    <p className="text-gray-400 text-sm truncate">{coin.name}</p>
                  </div>
                </div>
                <div className="text-right">
                  <p className="text-white font-bold">${coin.current_price?.toLocaleString('en-US', { maximumFractionDigits: 2 })}</p>
                  <p className={`text-sm font-semibold ${isPositive ? 'text-green-400' : 'text-red-400'}`}>
                    {isPositive ? '▲' : '▼'} {Math.abs(change).toFixed(2)}%
                  </p>
                </div>
              </div>
            </button>
          );
        };

        // Coin Detail View Component
        const CoinDetailView = ({ coin, onClose }) => {
          const [timeframe, setTimeframe] = React.useState('4h');
          const [chartType, setChartType] = React.useState('tradingview');
          const [exchange, setExchange] = React.useState('AUTO');

          const change = coin.price_change_percentage_24h || 0;
          const isPositive = change > 0;

          return (
            <div className="fixed inset-0 bg-black/80 z-50 overflow-y-auto">
              <button
                onClick={onClose}
                className="fixed top-4 right-4 bg-red-500 text-white p-2 rounded-lg hover:bg-red-600 z-51"
              >
                ✕
              </button>

              <div className="min-h-screen bg-gradient-to-b from-slate-900 via-blue-900 to-slate-900">
                <div className="max-w-7xl mx-auto p-4">
                  {/* Coin Header */}
                  <div className="bg-slate-800/50 border border-blue-500/20 rounded-lg p-6 mb-6">
                    <div className="flex items-start justify-between mb-6">
                      <div className="flex items-center gap-4">
                        {coin.image && (
                          <img src={coin.image} alt={coin.name} className="w-16 h-16 rounded-full" />
                        )}
                        <div>
                          <h2 className="text-3xl font-bold text-white">{coin.symbol.toUpperCase()}</h2>
                          <p className="text-gray-400">{coin.name}</p>
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                      <div>
                        <p className="text-gray-400 text-sm mb-1">Price</p>
                        <p className="text-white text-2xl font-bold">${coin.current_price?.toLocaleString('en-US', { maximumFractionDigits: 2 })}</p>
                      </div>
                      <div>
                        <p className="text-gray-400 text-sm mb-1">24H Change</p>
                        <p className={`text-xl font-bold ${isPositive ? 'text-green-400' : 'text-red-400'}`}>
                          {isPositive ? '▲' : '▼'} {Math.abs(change).toFixed(2)}%
                        </p>
                      </div>
                      <div>
                        <p className="text-gray-400 text-sm mb-1">24H High/Low</p>
                        <p className="text-white font-bold">${coin.high_24h?.toLocaleString('en-US', { maximumFractionDigits: 2 })} / ${coin.low_24h?.toLocaleString('en-US', { maximumFractionDigits: 2 })}</p>
                      </div>
                      <div>
                        <p className="text-gray-400 text-sm mb-1">Volume 24H</p>
                        <p className="text-white font-bold">${(coin.total_volume / 1e6)?.toFixed(2)}M</p>
                      </div>
                    </div>

                    {/* Action Buttons */}
                    <div className="flex flex-wrap gap-3">
                      <button className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg transition">
                        <Download size={16} /> PNG
                      </button>
                      <button className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg transition">
                        <Share2 size={16} /> Share
                      </button>
                      <button className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg transition">
                        <Link2 size={16} /> Link
                      </button>
                    </div>
                  </div>

                  {/* Timeframe Buttons */}
                  <div className="mb-6 flex flex-wrap gap-2">
                    {['1m', '3m', '5m', '15m', '30m', '1h', '2h', '4h', '6h', '12h', '1d', '3d', '1w', '1M'].map(tf => (
                      <button
                        key={tf}
                        onClick={() => setTimeframe(tf)}
                        className={`px-4 py-2 rounded-lg font-semibold transition ${
                          timeframe === tf ? 'bg-blue-500 text-white' : 'bg-slate-800 text-gray-400 hover:text-white'
                        }`}
                      >
                        {tf}
                      </button>
                    ))}
                  </div>

                  {/* Chart Section */}
                  <div className="bg-slate-800/50 border border-blue-500/20 rounded-lg p-6 mb-6">
                    <h3 className="text-white font-bold text-lg mb-4">📊 Chart</h3>

                    <div className="mb-4 space-y-4">
                      <div className="flex flex-wrap gap-3">
                        {['tradingview', 'native', 'area'].map(type => (
                          <button
                            key={type}
                            onClick={() => setChartType(type)}
                            className={`px-4 py-2 rounded-lg font-semibold transition ${
                              chartType === type ? 'bg-blue-500 text-white' : 'bg-slate-700 text-gray-400 hover:text-white'
                            }`}
                          >
                            {type === 'tradingview' && '📊 TradingView'}
                            {type === 'native' && '✨ Native + AI'}
                            {type === 'area' && '📈 Area'}
                          </button>
                        ))}
                      </div>

                      <div className="space-y-3">
                        <div>
                          <label className="text-gray-400 text-sm block mb-2">Exchange:</label>
                          <div className="flex flex-wrap gap-2">
                            {['AUTO', 'BINANCE', 'BYBIT', 'GATEIO', 'MEXC', 'OKX', 'KUCOIN', 'COINBASE', 'KRAKEN'].map(ex => (
                              <button
                                key={ex}
                                onClick={() => setExchange(ex)}
                                className={`px-3 py-1 text-sm rounded transition ${
                                  exchange === ex ? 'bg-blue-500 text-white' : 'bg-slate-700 text-gray-400 hover:text-white border border-blue-500/30'
                                }`}
                              >
                                {ex}
                              </button>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Chart Placeholder */}
                    <div className="bg-slate-900 rounded-lg h-80 flex items-center justify-center border border-blue-500/20">
                      <div className="text-center">
                        <p className="text-gray-400 mb-2">📈 Interactive Chart Area</p>
                        <p className="text-sm text-gray-500">TradingView charts load in production</p>
                      </div>
                    </div>

                    <p className="text-gray-500 text-xs mt-4">Tip: gunakan ikon search di chart untuk cari DEX/CEX apa pun.</p>
                  </div>

                  {/* Analysis Sections */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <AnalysisCard 
                      icon="🧠"
                      title="AI Technical Analysis"
                      items={[
                        { label: 'EMA 20', value: '$80,376.81', color: 'red' },
                        { label: 'EMA 50', value: '$61,647.03', color: 'green' },
                        { label: 'RSI 14', value: '42.4' },
                        { label: 'MACD Hist', value: '-5791.18' },
                        { label: 'ADX', value: '26.3', color: 'green' },
                        { label: 'SuperTrend', value: 'Bearish', color: 'red' },
                      ]}
                    />

                    <AnalysisCard 
                      icon="🎯"
                      title="Smart Entry System"
                      items={[
                        { label: 'Direction', value: 'SHORT', color: 'red' },
                        { label: 'Entry Zone', value: '$68.55 - $69.20' },
                        { label: 'Entry Ideal', value: '$69.085' },
                        { label: 'Stop Loss', value: '$69.91', color: 'red' },
                        { label: 'TP 1', value: '$66.85', color: 'green' },
                        { label: 'Risk/Reward', value: '1:2.77' },
                      ]}
                    />
                  </div>

                  {/* Warning Box */}
                  <div className="bg-yellow-900/20 border border-yellow-600/50 rounded-lg p-4">
                    <p className="text-yellow-600 text-sm">
                      ⚠ Analisis ini dihasilkan dari algoritma teknikal dan AI insight — bukan saran finansial. Selalu lakukan riset sendiri dan gunakan manajemen risiko yang tepat.
                    </p>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // Analysis Card Component
        const AnalysisCard = ({ icon, title, items }) => (
          <div className="bg-slate-800/50 border border-blue-500/20 rounded-lg p-4">
            <h4 className="text-white font-bold mb-4">{icon} {title}</h4>
            <div className="space-y-2">
              {items.map((item, idx) => (
                <div key={idx} className="flex justify-between">
                  <span className="text-gray-400 text-sm">{item.label}</span>
                  <span className={`font-bold text-sm ${item.color === 'red' ? 'text-red-400' : item.color === 'green' ? 'text-green-400' : 'text-white'}`}>
                    {item.value}
                  </span>
                </div>
              ))}
            </div>
          </div>
        );

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CryptoVisionApp />);
    </script>
</body>
</html>

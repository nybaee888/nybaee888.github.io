<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoVision AI - Real-time Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
        }
        .gradient-text {
            background: linear-gradient(to right, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-bg {
            background-color: #111827;
            border: 1px solid #1f2937;
        }
        /* Efek transisi halus saat harga berubah warna */
        .price-up { color: #34d399; transition: color 0.2s; }
        .price-down { color: #f87171; transition: color 0.2s; }
    </style>
</head>
<body class="font-sans min-h-screen pb-20">

    <header class="sticky top-0 z-50 bg-[#0b0f19]/80 backdrop-blur-md p-4 border-b border-gray-800">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center font-bold text-sm text-white shadow-lg">
                    CV
                </div>
                <span class="font-bold text-sm tracking-wide">CryptoVision <span class="text-xs bg-emerald-950 text-emerald-400 px-2 py-0.5 rounded ml-1 border border-emerald-900">Live</span></span>
            </div>
            <div class="text-xs text-gray-500 flex items-center gap-1">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> WebSocket Connected
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-4">

        <section class="card-bg rounded-2xl p-4 space-y-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-amber-500 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-md shadow-amber-500/20">₿</div>
                    <div>
                        <div class="flex items-center gap-1.5">
                            <span class="font-bold text-lg">Bitcoin</span>
                            <span class="text-xs text-gray-500 font-medium">BTC/USDT</span>
                        </div>
                        <div id="btc-price" class="text-2xl font-black tracking-tight text-gray-100">$0.00</div>
                    </div>
                </div>
                <div class="text-right">
                    <span id="btc-change" class="text-sm font-semibold px-2 py-1 rounded-md bg-gray-800 text-gray-400">
                        0.00%
                    </span>
                    <div class="text-[11px] text-gray-500 mt-2">24h High: <span id="btc-high" class="text-gray-300">$0.00</span></div>
                    <div class="text-[11px] text-gray-500">24h Low: <span id="btc-low" class="text-gray-300">$0.00</span></div>
                </div>
            </div>
        </section>

        <section class="card-bg rounded-2xl p-4 space-y-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-md shadow-indigo-500/20">Ξ</div>
                    <div>
                        <div class="flex items-center gap-1.5">
                            <span class="font-bold text-lg">Ethereum</span>
                            <span class="text-xs text-gray-500 font-medium">ETH/USDT</span>
                        </div>
                        <div id="eth-price" class="text-2xl font-black tracking-tight text-gray-100">$0.00</div>
                    </div>
                </div>
                <div class="text-right">
                    <span id="eth-change" class="text-sm font-semibold px-2 py-1 rounded-md bg-gray-800 text-gray-400">
                        0.00%
                    </span>
                    <div class="text-[11px] text-gray-500 mt-2">24h High: <span id="eth-high" class="text-gray-300">$0.00</span></div>
                    <div class="text-[11px] text-gray-500">24h Low: <span id="eth-low" class="text-gray-300">$0.00</span></div>
                </div>
            </div>
        </section>

        <section class="card-bg rounded-2xl p-4 space-y-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-md shadow-purple-500/20">SOL</div>
                    <div>
                        <div class="flex items-center gap-1.5">
                            <span class="font-bold text-lg">Solana</span>
                            <span class="text-xs text-gray-500 font-medium">SOL/USDT</span>
                        </div>
                        <div id="sol-price" class="text-2xl font-black tracking-tight text-gray-100">$0.00</div>
                    </div>
                </div>
                <div class="text-right">
                    <span id="sol-change" class="text-sm font-semibold px-2 py-1 rounded-md bg-gray-800 text-gray-400">
                        0.00%
                    </span>
                    <div class="text-[11px] text-gray-500 mt-2">24h High: <span id="sol-high" class="text-gray-300">$0.00</span></div>
                    <div class="text-[11px] text-gray-500">24h Low: <span id="sol-low" class="text-gray-300">$0.00</span></div>
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0b0f19] border-t border-gray-800 p-3 z-50">
        <div class="max-w-md mx-auto flex justify-around text-gray-500 text-xl">
            <button class="text-blue-500"><i class="fas fa-home"></i></button>
            <button class="hover:text-gray-300"><i class="fas fa-chart-line"></i></button>
            <button class="hover:text-gray-300"><i class="fas fa-search"></i></button>
            <button class="hover:text-gray-300"><i class="fas fa-bell"></i></button>
        </div>
    </nav>

    <script>
        // Nilai harga sebelumnya untuk komparasi naik/turun warna teks
        const previousPrices = { btc: 0, eth: 0, sol: 0 };

        // Alamat WebSocket Stream Gabungan Binance untuk pasangan pasar USDT ticker 24 jam
        const binanceWsUrl = "wss://stream.binance.com:9443/ws/btcusdt@ticker/ethusdt@ticker/solusdt@ticker";
        const ws = new WebSocket(binanceWsUrl);

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // Ekstraksi kode koin berdasarkan respon (ex: BTCUSDT -> btc)
            const symbol = data.s.replace('USDT', '').toLowerCase();
            
            // Data ticker dari Binance API
            const currentPrice = parseFloat(data.c); // c = close/current price
            const priceChangePercent = parseFloat(data.P); // P = price change percent
            const highPrice = parseFloat(data.h); // h = high price
            const lowPrice = parseFloat(data.l); // l = low price

            // Ambil elemen DOM berdasarkan id koin
            const priceEl = document.getElementById(`${symbol}-price`);
            const changeEl = document.getElementById(`${symbol}-change`);
            const highEl = document.getElementById(`${symbol}-high`);
            const lowEl = document.getElementById(`${symbol}-low`);

            if (priceEl) {
                // Format angka mata uang internasional ($)
                priceEl.innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(currentPrice);
                highEl.innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(highPrice);
                lowEl.innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(lowPrice);

                // Mengatur indikator warna teks harga saat fluktuasi tick berjalan
                if (currentPrice > previousPrices[symbol]) {
                    priceEl.className = "text-2xl font-black tracking-tight price-up";
                } else if (currentPrice < previousPrices[symbol]) {
                    priceEl.className = "text-2xl font-black tracking-tight price-down";
                }
                // Simpan harga saat ini untuk perbandingan di tick berikutnya
                previousPrices[symbol] = currentPrice;
            }

            if (changeEl) {
                changeEl.innerText = `${priceChangePercent >= 0 ? '+' : ''}${priceChangePercent.toFixed(2)}%`;
                if (priceChangePercent >= 0) {
                    changeEl.className = "text-sm font-semibold px-2 py-1 rounded-md bg-emerald-950/50 text-emerald-400 border border-emerald-900/40";
                } else {
                    changeEl.className = "text-sm font-semibold px-2 py-1 rounded-md bg-red-950/50 text-red-400 border border-red-900/40";
                }
            }
        };

        ws.onerror = (error) => {
            console.error("Kesalahan koneksi WebSocket data pasar: ", error);
        };
    </script>
</body>
</html>
